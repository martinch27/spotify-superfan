<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR · Spotify SuperFan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at center, #1ed760 0%, #0a3a1c 60%, #000 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #fff;
  }
  .card {
    background: #fff;
    color: #000;
    padding: 36px 36px 32px;
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    text-align: center;
    max-width: 460px;
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 700;
    color: #1db954;
    margin-bottom: 6px;
    letter-spacing: -.2px;
  }
  .brand svg { width: 24px; height: 24px; }
  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.5px;
    margin-bottom: 4px;
    line-height: 1.15;
  }
  .sub {
    font-size: 14px;
    color: #555;
    margin-bottom: 22px;
  }
  .qr {
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    aspect-ratio: 1;
    padding: 14px;
    background: #fff;
    border: 2px solid #f0f0f0;
    border-radius: 16px;
  }
  .qr img { display: block; width: 100%; height: 100%; }
  .url {
    margin-top: 18px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    color: #888;
    word-break: break-all;
  }
  .footer {
    margin-top: 14px;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 168 168"><circle cx="84" cy="84" r="84" fill="#1db954"/><path d="M119 121c-1.6 2.6-4.9 3.4-7.4 1.8-20.4-12.5-46-15.3-76.3-8.4-3 .7-5.9-1.2-6.6-4.2s1.2-5.9 4.2-6.6c33-7.5 61.4-4.3 84.3 9.7 2.6 1.6 3.4 4.9 1.8 7.7zm9.4-21.1c-2 3.3-6.3 4.3-9.6 2.3-23.4-14.4-58.9-18.5-86.5-10.2-3.6 1-7.5-1-8.5-4.6-1-3.6 1-7.5 4.6-8.5 31.5-9.5 70.7-4.9 97.6 11.6 3.3 2 4.3 6.3 2.4 9.4zm.8-22c-28-16.6-74.3-18.2-101-10.1-4.4 1.3-9-1.1-10.3-5.5-1.3-4.4 1.1-9 5.5-10.3 30.7-9.3 81.9-7.5 114.2 11.6 3.9 2.3 5.2 7.4 2.9 11.3-2.3 4-7.4 5.3-11.3 3z" fill="#fff"/></svg>
      Spotify · SuperFan
    </div>
    <h1>Scan for demo</h1>
    <p class="sub">Clickable SuperFan tier prototype</p>
    <div class="qr"><img src="qr.png" alt="QR code" /></div>
    <div class="url">martinch27.github.io/spotify-superfan</div>
    <div class="footer">Project defense · Genesis School · 2026</div>
  </div>
</body>
</html>
